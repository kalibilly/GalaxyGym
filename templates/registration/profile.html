{% extends "base.html" %}

{% block title %}Profile - Galaxy Gym{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <h1>Your Profile</h1>
        <div class="card">
            <div class="card-body">
                <table class="table">
                    <tr>
                        <th>Login ID</th>
                        <td>{{ user.login_id }}</td>
                    </tr>
                    <tr>
                        <th>Email</th>
                        <td>{{ user.email }}</td>
                    </tr>
                    <tr>
                        <th>Phone</th>
                        <td>{{ user.phone_number }}</td>
                    </tr>
                    <tr>
                        <th>Role</th>
                        <td>{{ user.get_role_display }}</td>
                    </tr>
                    <tr>
                        <th>Date Joined</th>
                        <td>{{ user.date_joined }}</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
